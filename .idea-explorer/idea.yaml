idea:
  title: Steering Vector Decay
  domain: nlp
  hypothesis: 'The influence of an activation steering vector v on model hidden states
    decays over subsequent generation steps after v is no longer added. The rate of
    this decay may differ if tokens generated with v are teacher-forced but not added
    to the hidden state.

    '
  background:
    description: 'Activation Steering is awesome and simple: use contrastive pairs
      to make a vector v that captures a behavior the model encodes, add it at every
      generation step, and you''ve got a model that acts a certain way. But if you
      add v for the first three tokens of generation, and then stop, how quickly do
      hidden states stop looking like v? How does this change if you teacher-force
      the tokens generated with v but don''t add them to the hidden state?

      '
  metadata:
    author: Ari Holtzman
    source: IdeaHub
    source_url: https://hypogenic.ai/ideahub/idea/h0MZpeE5daQUHo8dYkxt
